apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: repository-ca
  secretName: root-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  duration: 87600h
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: root-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vpn-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: vpn-ca
  secretName: vpn-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  duration: 87600h
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vpn-ca-issuer
spec:
  ca:
    secretName: vpn-ca-secret
