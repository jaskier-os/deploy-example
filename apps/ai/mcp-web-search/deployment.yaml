apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-web-search
  namespace: ai
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: mcp-web-search
  template:
    metadata:
      labels:
        app: mcp-web-search
    spec:
      containers:
      - name: mcp-web-search
        image: localhost:5000/mcp-web-search:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 10002
        env:
        - name: MCP_HTTP_ENABLED
          value: "true"
        - name: MCP_HTTP_PORT
          value: "10002"
        - name: COMMUNICATOR_URL
          value: "http://communicator.ai.svc.cluster.local:10000"
        - name: UNPAYWALL_EMAIL
          value: "you@example.com"
        envFrom:
        - secretRef:
            name: ai-secrets
        startupProbe:
          httpGet:
            path: /health
            port: 10002
          failureThreshold: 6
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 10002
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 10002
